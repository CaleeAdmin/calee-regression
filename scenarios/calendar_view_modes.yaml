name: calee-calendar-view-modes
tags: [calendar, views, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 25
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Wait for the calendar toolbar to render
    action: wait_for_id
    id: btnAddEvent
    timeout_seconds: 10

  # The Day/Week/Month/Agenda toggles (real labels, confirmed against
  # layout_calendar_navigation.xml) live in the calendar's navigation rail,
  # which can be collapsed/expanded via a separate toggle. This framework
  # doesn't yet know the rail's default expand state on a given build, so
  # these taps stay tap_if_present rather than a hard tap -- that is a real,
  # documented uncertainty about tablet layout state, not a guess about
  # label wording (the labels themselves are confirmed).
  - name: Switch to Day view if the navigation rail is showing it
    action: tap_if_present
    id: llDay

  - name: Let day view settle
    action: sleep
    seconds: 1.5

  - name: Capture day view
    action: screenshot
    screenshot_name: 00_day_view
    compare: false

  - name: Switch to Week view if the navigation rail is showing it
    action: tap_if_present
    id: llWeek

  - name: Let week view settle
    action: sleep
    seconds: 1.5

  - name: Capture week view
    action: screenshot
    screenshot_name: 01_week_view
    compare: false

  - name: Switch to Month view if the navigation rail is showing it
    action: tap_if_present
    id: llMonth

  - name: Let month view settle
    action: sleep
    seconds: 1.5

  - name: Capture month view
    action: screenshot
    screenshot_name: 02_month_view
    compare: false

  - name: Switch to Agenda view if the navigation rail is showing it
    action: tap_if_present
    id: llSchedule

  - name: Let agenda view settle
    action: sleep
    seconds: 1.5

  - name: Capture agenda view
    action: screenshot
    screenshot_name: 03_agenda_view
    compare: false

  - name: Assert still on the Calendar screen
    action: assert_id
    id: btnAddEvent

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
