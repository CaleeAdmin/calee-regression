name: calee-calendar-view-modes
tags: [calendar, views, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 25
steps:
  - name: Launch Calee
    action: launch

  - name: Let home screen settle
    action: sleep
    seconds: 3

  - name: Open Calendar if present
    action: tap_if_present
    text: Calendar

  - name: Let calendar settle
    action: sleep
    seconds: 2

  # Every view-mode tap is tap_if_present: exact label wording for Day/Week/Month
  # toggles is not guaranteed and must not hard-fail this scenario.
  - name: Switch to Day view if present
    action: tap_if_present
    text: Day

  - name: Let day view settle
    action: sleep
    seconds: 1.5

  - name: Capture day view
    action: screenshot
    screenshot_name: 00_day_view
    compare: false

  - name: Switch to Week view if present
    action: tap_if_present
    text: Week

  - name: Let week view settle
    action: sleep
    seconds: 1.5

  - name: Capture week view
    action: screenshot
    screenshot_name: 01_week_view
    compare: false

  - name: Switch to Month view if present
    action: tap_if_present
    text: Month

  - name: Let month view settle
    action: sleep
    seconds: 1.5

  - name: Capture month view
    action: screenshot
    screenshot_name: 02_month_view
    compare: false

  - name: Assert still within a calendar-ish screen
    action: assert_any_text
    texts: [Calendar, Today, Month, Week, Day]

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
