name: calee-calendar-view-modes
tags: [calendar, views, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 25
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Wait for the calendar toolbar to render
    action: wait_for_id
    id: btnAddEvent
    timeout_seconds: 10

  # The Day/Week/Month/Agenda navigation rail (ids confirmed against
  # layout_calendar_navigation.xml) is collapsed by default and its
  # expand/collapse state is a persisted per-device preference
  # (CalendarFragment.kt: SharedPreferences "calendar_ui_prefs" ->
  # "sidebar_expanded", default false -- see ivExpand's click handler).
  # A device that was previously used may already have it expanded, so
  # this uses tap_if_absent rather than blindly tapping ivExpand: blindly
  # tapping a toggle would collapse an already-expanded rail instead of
  # reliably reaching a known (expanded) state.
  - name: Expand the navigation rail if it is currently collapsed
    action: tap_if_absent
    unless_id: llDay
    id: ivExpand

  - name: Assert the navigation rail is now expanded
    action: wait_for_id
    id: llDay
    timeout_seconds: 10

  # From here the rail is guaranteed expanded, so every switch below is a
  # hard tap (not tap_if_present) followed by a real content assertion.
  # Selected/active state on the nav row itself (llDay/llWeek/llMonth/
  # llSchedule) is applied as background/text-color/typeface only
  # (CalendarFragment.select()) -- none of that is exposed as a UiAutomator
  # attribute, so "became active" is verified the only reliable way: by
  # waiting for the view-mode-specific content panel that HubCalendarFragment
  # shows exclusively (panelHubDay/panelHubWeek/panelHubMonth/panelHubAgenda,
  # confirmed against HubCalendarFragment.kt's exclusive-visibility switch)
  # to actually appear in the hierarchy.
  - name: Switch to Day view
    action: tap
    id: llDay

  - name: Verify Day view actually became active
    action: wait_for_id
    id: panelHubDay
    timeout_seconds: 10

  - name: Capture day view
    action: screenshot
    screenshot_name: 00_day_view
    compare: false

  - name: Switch to Week view
    action: tap
    id: llWeek

  - name: Verify Week view actually became active
    action: wait_for_id
    id: panelHubWeek
    timeout_seconds: 10

  - name: Capture week view
    action: screenshot
    screenshot_name: 01_week_view
    compare: false

  - name: Switch to Month view
    action: tap
    id: llMonth

  - name: Verify Month view actually became active
    action: wait_for_id
    id: panelHubMonth
    timeout_seconds: 10

  - name: Capture month view
    action: screenshot
    screenshot_name: 02_month_view
    compare: false

  - name: Switch to Agenda view
    action: tap
    id: llSchedule

  - name: Verify Agenda view actually became active
    action: wait_for_id
    id: panelHubAgenda
    timeout_seconds: 10

  - name: Capture agenda view
    action: screenshot
    screenshot_name: 03_agenda_view
    compare: false

  - name: Assert still on the Calendar screen
    action: assert_id
    id: btnAddEvent

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
