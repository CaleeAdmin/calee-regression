name: calee-tasks-mutation
tags: [tasks, mutation, tablet, draft-unverified, source-confirmed]
requires_state: logged_in_tablet
default_timeout_seconds: 20
mandatory: false
# SOURCE-CONFIRMED, PHYSICAL-UNVERIFIED (Workstream 4).
#
# The task row's controls now come from the real Calee source
# (item_task_list.xml): the row card is `taskItemCard`, the title cell is
# `tvName`, and completion is a single stateful toggle target `flCheckboxTarget`
# (the same target both completes and reopens a task -- there is no separate
# "reopen" control). See the source_verification block below.
#
# Because every task row reuses those same ids, this scenario uses the
# row-scoped actions (Workstream 4): each `tap_in_row`/`assert_in_row` locates
# the ONE row whose visible title is the fixture's REG-TASK-OPEN-001 and acts on
# a descendant within it -- never the first global `flCheckboxTarget`. A zero-
# or multiple-row match fails loudly instead of toggling the wrong task.
#
# Still gated (mandatory: false, draft-unverified, not in any release suite)
# until a real device pass -- see docs/TABLET_MUTATION_COVERAGE_GAPS.md.
#
# Uses the fixture's own REG-TASK-OPEN-001 (see docs/TEST_DATA_RESET_CONTRACT.md)
# and reopens it at the end, leaving the fixture as found. NOTE: the
# tablet-side completed/open *state* is asserted authoritatively by the API/sync
# leg (Workstream 5), not here -- the completed state is shown by swapping the
# `ivIcon` drawable, which is not a distinct resource-id Appium can assert. The
# UI evidence this scenario contributes is the row-scoped toggle resolving
# uniquely, the row surviving the RecyclerView rebind, and the screenshots.
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llTask
    timeout_seconds: 20

  - name: Open Tasks
    action: tap
    id: llTask

  - name: Wait for the Tasks screen to render
    action: wait_for_id
    id: llAll
    timeout_seconds: 10

  - name: Wait for the deterministic open fixture task to appear
    action: wait_for_text
    text: REG-TASK-OPEN-001
    timeout_seconds: 20

  - name: Capture the tasks screen before any change
    action: screenshot
    screenshot_name: 00_before_complete
    compare: false

  - name: Mark the fixture task complete (row-scoped toggle, not the first global one)
    action: tap_in_row
    card_id: taskItemCard
    title_id: tvName
    title: REG-TASK-OPEN-001
    target_id: flCheckboxTarget

  - name: Wait a moment for the completion state to take effect
    action: sleep
    seconds: 2

  - name: Capture the tasks screen after completing
    action: screenshot
    screenshot_name: 01_after_complete
    compare: false

  - name: Assert the fixture task row is still present (survived the RecyclerView rebind)
    # Real verification that the row-scoped resolution still finds exactly the
    # fixture row after the toggle rebinds the list. The authoritative
    # completed-vs-open assertion is the API/sync leg (Workstream 5).
    action: assert_in_row
    card_id: taskItemCard
    title_id: tvName
    title: REG-TASK-OPEN-001
    target_id: tvName

  - name: Reopen the fixture task, restoring its original state (same stateful toggle)
    action: tap_in_row
    card_id: taskItemCard
    title_id: tvName
    title: REG-TASK-OPEN-001
    target_id: flCheckboxTarget

  - name: Wait a moment for the reopened state to take effect
    action: sleep
    seconds: 2

  - name: Capture the tasks screen after reopening
    action: screenshot
    screenshot_name: 02_after_reopen
    compare: false

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]

source_verification:
  calee_source: CaleeAdmin/Calee
  calee_source_sha: "931beecfc309ff12220185383fa8daae56af30d8"  # Calee release #974 (main)
  calee_source_ref: "main (release #974); identical layouts on dev @ b32807d"
  status: source-confirmed
  physical_confirmation: pending
  selectors:
    taskItemCard: app/src/main/res/layout/item_task_list.xml
    tvName: app/src/main/res/layout/item_task_list.xml
    flCheckboxTarget: app/src/main/res/layout/item_task_list.xml
    ivIcon: app/src/main/res/layout/item_task_list.xml
  notes:
    - "flCheckboxTarget is a single stateful toggle: the same target completes and reopens a task."
    - "Completed state swaps the ivIcon drawable (fangkuang -> checked); not a distinct resource id, so tablet completed-state is API-authoritative."
