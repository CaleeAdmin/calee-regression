name: calee-home-navigation
tags: [navigation, tablet, logged_in]
requires_state: logged_in_tablet
default_timeout_seconds: 25
steps:
  - name: Launch Calee
    action: launch

  - name: Let home screen settle
    action: sleep
    seconds: 3

  - name: Capture home screen
    action: screenshot
    screenshot_name: 00_home
    compare: false

  # Every tap below is tap_if_present: exact nav labels/ids aren't guaranteed across
  # releases, and this scenario must not hard-fail the whole suite over label wording.
  - name: Open Calendar if present
    action: tap_if_present
    text: Calendar

  - name: Let calendar settle
    action: sleep
    seconds: 2

  - name: Capture calendar tab
    action: screenshot
    screenshot_name: 01_calendar_tab
    compare: false

  - name: Back to home
    action: back

  - name: Open Tasks if present
    action: tap_if_present
    text: Tasks

  - name: Let tasks settle
    action: sleep
    seconds: 2

  - name: Capture tasks tab
    action: screenshot
    screenshot_name: 02_tasks_tab
    compare: false

  - name: Back to home
    action: back

  - name: Open Chores if present
    action: tap_if_present
    text: Chores

  - name: Let chores settle
    action: sleep
    seconds: 2

  - name: Capture chores tab
    action: screenshot
    screenshot_name: 03_chores_tab
    compare: false

  - name: Back to home
    action: back

  - name: Open Settings if present
    action: tap_if_present
    text: Settings

  - name: Let settings settle
    action: sleep
    seconds: 2

  - name: Capture settings tab
    action: screenshot
    screenshot_name: 04_settings_tab
    compare: false

  - name: Back to home
    action: back

  - name: Assert still on a Calee screen (not crashed)
    action: assert_any_text
    texts: [Calee, Calendar, Tasks, Chores, Home, Today, Weather, Settings]

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
