name: calee-home-navigation
tags: [navigation, tablet, logged_in]
requires_state: logged_in_tablet
default_timeout_seconds: 25
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Capture home screen
    action: screenshot
    screenshot_name: 00_home
    compare: false

  # Today/Calendar/Tasks are unconditional bottom-navigation tabs (always
  # present, per activity_home.xml) so these are hard taps with a real
  # per-screen assertion, not a soft "if present" probe.
  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Assert the Calendar screen actually rendered
    action: wait_for_id
    id: btnAddEvent
    timeout_seconds: 10

  - name: Capture calendar tab
    action: screenshot
    screenshot_name: 01_calendar_tab
    compare: false

  - name: Back to home
    action: back

  - name: Open Tasks
    action: tap
    id: llTask

  # Assert the always-visible Tasks content root (fragment_task.xml's
  # @+id/taskView FrameLayout), NOT llAll: llAll lives inside the task-list
  # navigation sidebar (layout_task_navigation.xml), which TaskFragment.initView
  # sets to View.GONE by default and only reveals when the user taps ivExpand.
  # A GONE view is absent from the Appium hierarchy, so waiting for llAll timed
  # out even though the Tasks screen had rendered correctly.
  - name: Assert the Tasks screen actually rendered
    action: wait_for_id
    id: taskView
    timeout_seconds: 10

  - name: Capture tasks tab
    action: screenshot
    screenshot_name: 02_tasks_tab
    compare: false

  - name: Back to home
    action: back

  # Chores is a conditional tab (hidden entirely for accounts/experience
  # modes without a chore-capable service), so this stays optional -- see
  # docs/TEST_DATA_RESET_CONTRACT.md for what "no chore service" means for
  # this scenario's coverage. then_wait_for_id makes a present-but-broken
  # chores tab a real FAILED instead of silently passing on a bare tap.
  - name: Open Chores if this account has a Chores tab
    action: tap_if_present
    id: llChores
    optional: true
    then_wait_for_id: choresRecyclerView
    then_wait_for_id_timeout_seconds: 10

  - name: Let chores settle
    action: sleep
    seconds: 2

  - name: Capture chores tab
    action: screenshot
    screenshot_name: 03_chores_tab
    compare: false

  - name: Back to home
    action: back

  - name: Open Settings
    action: tap
    id: ivHomeSetting

  # Assert a stable top-of-screen Settings landmark (fragment_settings.xml's
  # @+id/tvProfileHeader, the "Profile" header rendered first in the settings
  # ScrollView), NOT tvLogout: tvLogout is the "Log out" button at the very
  # bottom of that ScrollView. Using logout as the generic render assertion is
  # both fragile (bottom of a long scroll) and conflates "Settings rendered"
  # with "logout is available"; tvProfileHeader proves the screen rendered
  # without either problem. (Logout-specific behaviour belongs in a scenario
  # whose subject is logging out.)
  - name: Assert the Settings screen actually rendered
    action: wait_for_id
    id: tvProfileHeader
    timeout_seconds: 10

  - name: Capture settings tab
    action: screenshot
    screenshot_name: 04_settings_tab
    compare: false

  - name: Back to home
    action: back

  - name: Assert home screen is showing again
    action: assert_id
    id: llCalendar

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
