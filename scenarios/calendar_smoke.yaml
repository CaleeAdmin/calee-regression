name: calee-calendar-smoke
tags: [calendar, smoke, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Let home screen settle
    action: sleep
    seconds: 3

  - name: Open Calendar if present
    action: tap_if_present
    text: Calendar

  - name: Let calendar settle
    action: sleep
    seconds: 2

  - name: Capture calendar home
    action: screenshot
    screenshot_name: 00_calendar_home
    compare: false

  - name: Assert calendar screen content
    action: assert_any_text
    texts: [Calendar, Today, Month, Week, Day]

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
