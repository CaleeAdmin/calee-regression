name: calee-calendar-smoke
tags: [calendar, smoke, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Wait for the calendar toolbar to render
    action: wait_for_id
    id: btnAddEvent
    timeout_seconds: 10

  - name: Capture calendar home
    action: screenshot
    screenshot_name: 00_calendar_home
    compare: false

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
