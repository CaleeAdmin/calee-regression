name: calee-tasks-smoke
tags: [tasks, smoke, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llTask
    timeout_seconds: 20

  - name: Open Tasks
    action: tap
    id: llTask

  # taskView (fragment_task.xml's always-visible content root), NOT llAll:
  # llAll lives in the task-list navigation sidebar, which TaskFragment renders
  # View.GONE by default (revealed only via ivExpand), so it is absent from the
  # Appium hierarchy and timed out despite the Tasks screen rendering fine.
  - name: Wait for the Tasks screen to render
    action: wait_for_id
    id: taskView
    timeout_seconds: 10

  - name: Capture tasks screen
    action: screenshot
    screenshot_name: 00_tasks_screen
    compare: false

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
