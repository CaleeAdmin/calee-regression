name: calee-settings-smoke
tags: [settings, smoke, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Let home screen settle
    action: sleep
    seconds: 3

  - name: Open Settings if present
    action: tap_if_present
    text: Settings

  - name: Let settings screen settle
    action: sleep
    seconds: 2

  - name: Capture settings screen
    action: screenshot
    screenshot_name: 00_settings_screen
    compare: false

  - name: Assert settings screen content
    action: assert_any_text
    texts: [Settings, About, Version, "Wi-Fi", Display]

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
