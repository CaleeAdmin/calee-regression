name: calee-settings-smoke
tags: [settings, smoke, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  # Settings is not a bottom-navigation tab and has no on-screen "Settings"
  # text at the home level -- it's an icon-only gear button. A previous
  # version of this scenario searched for text: Settings here, which never
  # matched anything and silently no-opped every run (tap_if_present on a
  # target that could never be found).
  - name: Open Settings
    action: tap
    id: ivHomeSetting

  - name: Wait for the Settings screen to render
    action: wait_for_id
    id: tvLogout
    timeout_seconds: 10

  - name: Capture settings screen
    action: screenshot
    screenshot_name: 00_settings_screen
    compare: false

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
