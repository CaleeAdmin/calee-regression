name: calee-chores-smoke
tags: [chores, smoke, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  # Chores is a conditional bottom-navigation tab, hidden entirely for
  # accounts/experience modes without a chore-capable ("portal") service.
  # See docs/TEST_DATA_RESET_CONTRACT.md for how "no chore service" is
  # expected to be handled by this scenario. Its absence is explicitly
  # marked optional (so this scenario can still PASS on a no-chores
  # account), but if llChores IS present, then_wait_for_id makes tapping
  # it and failing to actually render the chores list (id=choresRecyclerView,
  # confirmed against layout_chores_navigation.xml) a real, hard FAILED --
  # a present-but-broken chores tab must not silently pass.
  - name: Open Chores if this account has a Chores tab
    action: tap_if_present
    id: llChores
    optional: true
    then_wait_for_id: choresRecyclerView
    then_wait_for_id_timeout_seconds: 10

  - name: Let chores screen settle
    action: sleep
    seconds: 2

  - name: Capture chores screen
    action: screenshot
    screenshot_name: 00_chores_screen
    compare: false

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
