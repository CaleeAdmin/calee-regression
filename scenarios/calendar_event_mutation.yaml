name: calee-calendar-event-mutation
tags: [calendar, mutation, tablet, draft-unverified, source-confirmed]
requires_state: logged_in_tablet
default_timeout_seconds: 20
mandatory: false
# SOURCE-CONFIRMED, PHYSICAL-UNVERIFIED (Workstream 4).
#
# Every interactive resource id below now comes from the real Calee Android
# tablet source (CaleeAdmin/Calee) -- see docs/TABLET_MUTATION_COVERAGE_GAPS.md
# and the source_verification block at the foot of this file for the exact
# layout file each id is defined in and the Calee commit they were read from.
# They are NO LONGER guesses.
#
# What is still missing is a *physical* pass: this scenario has not yet been
# run end to end against a prepared tablet/emulator, so it stays gated exactly
# as before -- `mandatory: false`, tagged `draft-unverified`, and absent from
# every release suite (full-tester/release-technical/calendar). Promotion (drop
# draft-unverified, add to full-tester) happens only after a real device pass;
# framework_tests/test_tablet_mutation_drafts.py enforces that state machine.
#
# Exercises create -> verify -> edit -> verify -> delete -> verify
# disappearance for a single scratch calendar event, entirely on the tablet.
#
# The two scratch titles (ALPHA/BRAVO) are deliberately chosen so neither is a
# substring of the other -- fail_if_text/text_present do a raw substring check
# against the page source, so e.g. "...-001" vs "...-001-EDITED" would make the
# "old title is gone" assertion fail even after a correct edit.
#
# Self-cleaning by design: creates its own scratch event and deletes it again
# by the end, never touching the shared REG-* fixture. If a previous run
# crashed before the delete step, a leftover
# "REG-SCRATCH-EVENT-MUTATION-ALPHA"/"-BRAVO" event may need removing by hand
# (best-effort cleanup guidance is in docs/TABLET_MUTATION_COVERAGE_GAPS.md).
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Wait for the calendar toolbar to render
    action: wait_for_id
    id: btnAddEvent
    timeout_seconds: 10

  - name: Tap Add Event
    action: tap
    id: btnAddEvent

  - name: Wait for the add-event form to render
    action: wait_for_id
    id: etEventTitle
    timeout_seconds: 10

  - name: Type the scratch event's title
    action: type_text
    id: etEventTitle
    text: REG-SCRATCH-EVENT-MUTATION-ALPHA

  - name: Hide the keyboard so the save control isn't covered
    action: hide_keyboard

  - name: Save the new event
    action: tap
    id: btnEventSave

  - name: Switch to Agenda view to reliably locate the new event
    action: tap
    id: llSchedule

  - name: Wait for the newly created event to appear
    action: wait_for_text
    text: REG-SCRATCH-EVENT-MUTATION-ALPHA
    timeout_seconds: 20

  - name: Capture the event list after creation
    action: screenshot
    screenshot_name: 00_after_create
    compare: false

  - name: Open the newly created event
    # tap_unique_text (not plain tap/text) -- fails loudly on zero or
    # multiple matching rows instead of silently acting on whichever
    # find_element happens to return first. The Agenda list has no
    # row-container resource id to scope by (unlike task/chore rows), so this
    # is the flat-list equivalent of tap_in_row's "never select an arbitrary
    # row" guarantee.
    action: tap_unique_text
    text: REG-SCRATCH-EVENT-MUTATION-ALPHA

  - name: Wait for event detail dialog to render
    action: wait_for_id
    id: tvEventDetailTitle
    timeout_seconds: 10

  - name: Assert the created event's title is shown
    action: assert_text
    text: REG-SCRATCH-EVENT-MUTATION-ALPHA

  - name: Open the edit form for this event
    action: tap
    id: btnEventDetailEdit

  - name: Wait for the edit form to render
    # The edit form reuses the same dialog_hub_event_form as create, so the
    # title field is the same etEventTitle (pre-filled with the current title).
    action: wait_for_id
    id: etEventTitle
    timeout_seconds: 10

  - name: Clear the existing title
    action: clear_text
    id: etEventTitle

  - name: Type the edited title
    action: type_text
    id: etEventTitle
    text: REG-SCRATCH-EVENT-MUTATION-BRAVO

  - name: Expand "More details" to reach the location field
    # etEventLocation lives inside containerEventMoreDetails, which starts
    # visibility="gone" until rowEventMoreDetails is tapped (see
    # dialog_hub_event_form.xml). Editing only the title would not exercise
    # "edit the title and at least one additional meaningful field".
    action: tap
    id: rowEventMoreDetails

  - name: Wait for the location field to render
    action: wait_for_id
    id: etEventLocation
    timeout_seconds: 10

  - name: Type a second, meaningful edited field (location)
    action: type_text
    id: etEventLocation
    text: REG-SCRATCH-EVENT-MUTATION-LOCATION

  - name: Hide the keyboard so the save control isn't covered
    action: hide_keyboard

  - name: Save the edit
    action: tap
    id: btnEventSave

  - name: Switch to Agenda view to confirm the edit stuck
    action: tap
    id: llSchedule

  - name: Wait for the edited title to appear
    action: wait_for_text
    text: REG-SCRATCH-EVENT-MUTATION-BRAVO
    timeout_seconds: 20

  - name: Assert the pre-edit title is gone from the list
    action: fail_if_text
    text: REG-SCRATCH-EVENT-MUTATION-ALPHA

  - name: Capture the event list after edit
    action: screenshot
    screenshot_name: 01_after_edit
    compare: false

  - name: Open the edited event
    # tap_unique_text -- see the "Open the newly created event" step above.
    action: tap_unique_text
    text: REG-SCRATCH-EVENT-MUTATION-BRAVO

  - name: Wait for event detail dialog to render again
    action: wait_for_id
    id: tvEventDetailTitle
    timeout_seconds: 10

  - name: Assert the second edited field (location) is shown
    action: assert_text
    text: REG-SCRATCH-EVENT-MUTATION-LOCATION

  - name: Delete this event
    action: tap
    id: btnEventDetailDelete

  - name: Confirm deletion
    # Delete raises the shared confirmation dialog (dialog_calee_confirm)
    # whose primary action is btnConfirmAction. Source-confirmed (not yet
    # physically confirmed): HubEventDetailDialog.kt's delete-result listener
    # calls dismissAllowingStateLoss() as soon as RESULT_KEY_DELETE_SUCCESS is
    # true, so confirming here closes the detail dialog itself and returns
    # straight to the Agenda list -- no separate back/close tap is needed. The
    # "Switch to Agenda view" step below is therefore redundant-but-harmless
    # (already the active screen), not compensating for an open dialog.
    action: tap
    id: btnConfirmAction

  - name: Switch to Agenda view to confirm deletion
    action: tap
    id: llSchedule

  - name: Wait a moment for the deletion to take effect
    action: sleep
    seconds: 2

  - name: Assert the deleted event no longer appears
    action: fail_if_text
    text: REG-SCRATCH-EVENT-MUTATION-BRAVO

  - name: Capture the event list after deletion
    action: screenshot
    screenshot_name: 02_after_delete
    compare: false

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]

# Source of every resource id above, read from the canonical Calee tablet
# source (CaleeAdmin/Calee). Re-confirmed against the current checkout (branch
# claude/tablet-sync-blockers-8oizn3, 0.3.25 "Add calendar appearance editing
# (name + colour) support (#979)"); unchanged since release #974. See
# docs/TABLET_MUTATION_COVERAGE_GAPS.md.
source_verification:
  calee_source: CaleeAdmin/Calee
  calee_source_sha: "d5b99712158c27f435681946326f0c7b8df54a3e"  # Calee main, 0.3.25 (#979)
  calee_source_ref: "main, 0.3.25 (#979); unchanged since release #974 (931beecf)"
  status: source-confirmed
  physical_confirmation: pending
  selectors:
    etEventTitle: app/src/main/res/layout/dialog_hub_event_form.xml
    btnEventSave: app/src/main/res/layout/dialog_hub_event_form.xml
    rowEventMoreDetails: app/src/main/res/layout/dialog_hub_event_form.xml
    etEventLocation: app/src/main/res/layout/dialog_hub_event_form.xml
    btnEventDetailEdit: app/src/main/res/layout/dialog_hub_event_detail.xml
    btnEventDetailDelete: app/src/main/res/layout/dialog_hub_event_detail.xml
    tvEventDetailTitle: app/src/main/res/layout/dialog_hub_event_detail.xml
    btnConfirmAction: app/src/main/res/layout/dialog_calee_confirm.xml
