name: calee-calendar-appearance-subscription
tags: [calendar, appearance, subscription, tablet, draft-unverified, source-confirmed]
requires_state: logged_in_tablet
default_timeout_seconds: 20
mandatory: false
# SOURCE-CONFIRMED, PHYSICAL-UNVERIFIED.
#
# Proves the tablet side of the calendar name/colour appearance-editing
# contract (calee-hub-core PATCH /client/v1/calendars/{id}/appearance; Calee
# PR CaleeAdmin/Calee#977, commit f1b92ddae9275cb0abea0f6df34126930e3aa71d)
# for a SUBSCRIPTION calendar. capabilities.canEditAppearance is true for a
# subscription, so ivEdit is visible/tappable, and its edit dialog shows the
# subscription-specific "local display only" note (appearanceMode
# "subscription_mapping" -- a reasonable mapping of the REG-SUB ICS-feed
# fixture onto the four documented appearanceMode values, not itself part of
# the transcribed diff, since the diff describes the tablet UI, not which
# mode a given calendar resolves to).
#
# Single-device-observable by design: this checks what ONE app (the tablet)
# renders for one calendar's edit dialog, and does not save/mutate anything
# (closes via Cancel) -- the shared REG-SUB fixture calendar's real name/
# colour is never changed here. Genuinely cross-device coverage (rename on
# one surface, verify on another; colour change; refresh-preserves-override)
# is deliberately NOT attempted in this YAML file -- see
# run_calendar_appearance_sync_flow in calee_regression/sync_smoke.py, since
# this repo's ScenarioRunner drives exactly one CaleeDriver/one device per
# run (runner.py:536) and cannot express a cross-device assertion here.
#
# PREREQUISITES (why this stays gated even once physically confirmed):
#  1. The regression-owned subscription source
#     (fixtures/subscribed_calendar/reg_sub_calendar.ics, calendar id
#     "regression:regsub", display name "REG-SUB Regression Subscription"
#     from its X-WR-CALNAME) must be provisioned on the tablet's account,
#     exactly as docs/SUBSCRIBED_CALENDAR_REGRESSION.md describes -- needs
#     the hub backend, not available in this environment.
#  2. Reaching the calendar list (item_calendar_navigation_list.xml) rows
#     that host ivEdit reuses this repo's own already-source-confirmed
#     "expand the calendar navigation rail" mechanism (ivExpand/llDay, see
#     scenarios/calendar_view_modes.yaml) -- CalendarFragment.kt is the same
#     fragment that owns both the Day/Week/Month/Agenda rail and (per the
#     new diff) the calendar list rows, so reusing it is a reasonable
#     extension of an already-confirmed mechanism, not a guess -- but that
#     specific reuse was not independently re-confirmed in this session's
#     transcript.
#  3. ROW-SCOPING GAP: item_calendar_navigation_list.xml's row-CONTAINER id
#     (the "card_id" tap_in_row/assert_in_row/fail_if_in_row would need --
#     see docs/TABLET_MUTATION_COVERAGE_GAPS.md for why task/chore rows
#     needed exactly this treatment) was not part of the transcribed diff
#     and is not source-confirmed. The steps below therefore target ivEdit
#     by bare id (first match in document order), not row-scoped -- correct
#     only if the REG-SUB row is the only calendar row with a matching
#     element on screen at that point. On an account with more than one
#     editable calendar simultaneously visible this could tap/assert the
#     wrong row's control. Confirming a row-container id and switching to
#     the row-scoped actions already used for task/chore rows is required
#     before this can be trusted on a multi-calendar account.
#  4. Colour is never asserted visually here -- no colour-reading primitive
#     exists in CaleeDriver (calee_regression/appium_driver.py only offers
#     id/text presence, tap, type, clear). This scenario proves the colour
#     LABEL/CONTROL is present (a colour-independent proxy), not that any
#     particular colour is shown -- see docs/CALENDAR_APPEARANCE_REGRESSION.md.
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Wait for the calendar toolbar to render
    action: wait_for_id
    id: btnAddEvent
    timeout_seconds: 10

  - name: Expand the navigation rail if it is currently collapsed
    action: tap_if_absent
    unless_id: llDay
    id: ivExpand

  - name: Assert the navigation rail (and its calendar list) is now expanded
    action: wait_for_id
    id: llDay
    timeout_seconds: 10

  - name: The REG-SUB subscription calendar row is visible in the calendar list
    action: wait_for_text
    text: REG-SUB Regression Subscription
    timeout_seconds: 20

  - name: Capture the calendar list with the subscription row
    action: screenshot
    screenshot_name: 00_calendar_list_subscription_row
    compare: false

  - name: Edit is available for a subscription calendar (canEditAppearance)
    action: assert_id
    id: ivEdit

  - name: Open the edit dialog for the subscription calendar
    action: tap
    id: ivEdit

  - name: Wait for the edit dialog to render
    action: wait_for_id
    id: tvCollectionTitle
    timeout_seconds: 10

  - name: Dialog title reads "Edit Name & Colour"
    action: assert_text
    text: Edit Name & Colour

  - name: Name label reads "Name in Calee"
    action: assert_text
    text: Name in Calee

  - name: Name input is present
    action: assert_id
    id: etCollectionName

  - name: Colour label is present with its own id (previously unlabelled)
    action: assert_id
    id: tvCollectionColorLabel

  - name: Colour label reads "Colour in Calee"
    action: assert_text
    text: Colour in Calee

  - name: Appearance note is present for a subscription (local-display-only) calendar
    action: assert_id
    id: tvCollectionAppearanceNote

  - name: Appearance note explains this only affects the Calee-local display
    action: assert_text
    text: These changes only affect how this calendar appears in Calee.

  - name: Save control is present
    action: assert_id
    id: btnCollectionSave

  - name: Cancel control is present
    action: assert_id
    id: btnCollectionCancel

  # Destructive area (Calee PR #978): capability-driven. A subscription has
  # canDeleteSource=false / canRemoveFromCalee=true, so with the tablet's
  # global create/delete setting enabled the dialog offers "Remove Calendar"
  # (removal wording, unsubscribe route) -- never the source-delete action.
  - name: Destructive control is present for a subscription (canRemoveFromCalee)
    action: assert_id
    id: btnCollectionDelete

  - name: Destructive control reads "Remove Calendar" (removal, not deletion)
    action: assert_text
    text: Remove Calendar

  - name: Source-deletion wording is never shown for a subscription
    action: fail_if_text
    texts: ["Delete Calendar"]

  - name: Capture the subscription calendar's edit dialog
    action: screenshot
    screenshot_name: 01_edit_dialog_subscription
    compare: false

  - name: Close the dialog without saving (never mutate the shared fixture)
    action: tap
    id: btnCollectionCancel

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]

source_verification:
  calee_source: CaleeAdmin/Calee
  calee_source_sha: "a9c78199c7b24265525c1d303ce280b3633418eb"
  calee_source_ref: "PR CaleeAdmin/Calee#978, branch claude/calendar-appearance-regressions-n5hrnw (based on latest dev; supersedes the #977-era confirmation)"
  status: source-confirmed
  physical_confirmation: pending
  contract:
    - "ivEdit VISIBLE+clickable iff capabilities.canEditAppearance == true, else INVISIBLE (CalendarFragment.kt)"
    - "tvOwnerManagedNote VISIBLE iff appearanceMode == \"unsupported\", else GONE (item_calendar_navigation_list.xml, R.string.hub_calendar_owner_managed_message)"
    - "HubCalendarEditDialog.tvCollectionAppearanceNote text is keyed off appearanceMode; subscription_mapping/external_calendar -> hub_calendar_appearance_note_local_only"
    - "Saving calls PATCH /client/v1/calendars/{id}/appearance with ONLY the changed fields (HubCalendarAppearancePatch; backend-internal, not tablet-UI-observable, not asserted here)"
    - "Destructive action resolved by HubCalendarDestructiveActions.resolve(): global create/delete setting can only hide, capabilities grant; subscription (canDeleteSource=false, canRemoveFromCalee=true, subscription_mapping) -> btnCollectionDelete text \"Remove Calendar\" with REMOVE_CONFIRM_MESSAGE removal wording"
    - "Subscription removal routes through removeSubscriptionFromCalee() -> DELETE /client/v1/calendars/{id} (local synced collection + mapping soft-delete only; upstream feed untouched -- verified in calee-hub-core client_api_delete_calendar_for_account())"
  selectors:
    ivEdit: app/src/main/res/layout/item_calendar_navigation_list.xml
    tvCollectionTitle: app/src/main/res/layout/dialog_hub_collection_manage.xml
    tvCollectionNameLabel: app/src/main/res/layout/dialog_hub_collection_manage.xml
    etCollectionName: app/src/main/res/layout/dialog_hub_collection_manage.xml
    tvCollectionColorLabel: app/src/main/res/layout/dialog_hub_collection_manage.xml
    tvCollectionAppearanceNote: app/src/main/res/layout/dialog_hub_collection_manage.xml
    btnCollectionSave: app/src/main/res/layout/dialog_hub_collection_manage.xml
    btnCollectionCancel: app/src/main/res/layout/dialog_hub_collection_manage.xml
    btnCollectionDelete: app/src/main/res/layout/dialog_hub_collection_manage.xml
  fixture:
    source: fixtures/subscribed_calendar/reg_sub_calendar.ics
    calendarId: "regression:regsub"
    calendarDisplayName: "REG-SUB Regression Subscription"
  notes:
    - "Requires the REG-SUB subscription source provisioned on the tablet account (hub backend) -- BLOCKED without it, same prerequisite as scenarios/subscribed_calendar.yaml."
    - "The destructive-control assertions additionally require the tablet's global calendar create/delete setting (AccountMgr.getShowCalendarCreateDeleteOptions) to be ENABLED on the regression account; with it off the button is hidden for every calendar type (the setting hides, capabilities grant)."
    - "Row-scoping gap: item_calendar_navigation_list.xml's row-container id is not source-confirmed here, so ivEdit/etc. are targeted by bare id, not row-scoped -- see the header comment."
    - "Colour is never asserted visually -- no colour-reading primitive exists in CaleeDriver. See docs/CALENDAR_APPEARANCE_REGRESSION.md for the full gap writeup."
