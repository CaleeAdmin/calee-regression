name: calee-calendar-recurring-events
tags: [calendar, recurring, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
# Requires the deterministic regression fixture to have been reset first
# (see docs/TEST_DATA_RESET_CONTRACT.md and CaleeMobile-Regression's
# caleemobile_regression/fixture.py) so REG-EVENT-RECURRING-001 and its
# detached occurrence REG-EVENT-EXCEPTION-001 exist with known titles. This
# scenario cannot pass without actually finding and opening both — there is
# no optional/tap_if_present step left in the recurrence-verification path.
steps:
  - name: Launch Calee
    action: launch

  - name: Wait for home screen to settle
    action: wait_for_id
    id: llCalendar
    timeout_seconds: 20

  - name: Open Calendar
    action: tap
    id: llCalendar

  - name: Switch to Agenda view
    action: tap
    id: llSchedule

  # Navigate to the exact expected occurrence date before searching for the
  # title, in Australia/Perth date semantics. REG-EVENT-RECURRING-001's first
  # occurrence is created on the fixture-reset date -- "today" in Perth --
  # (CaleeMobile-Regression fixture.py: startsAt = <today>T14:00:00,
  # FREQ=WEEKLY;COUNT=6). Tapping the date title (llDateSelect) invokes
  # CalendarFragment's goToToday(), anchoring the agenda's window on today so we
  # never text-search on a stale/wrong day. (If the tablet's Perth "today" has
  # rolled past the fixture machine's date, the +7d occurrence carries the same
  # title and is still within the agenda's forward window.)
  - name: Anchor the calendar on today (go to today)
    action: tap
    id: llDateSelect

  # Force a fresh Hub load and let sync settle, so a just-reset fixture is
  # actually fetched before we assert on it (avoids a false "not found" on a
  # calendar that simply hadn't synced the new events yet).
  - name: Force a calendar refresh
    action: tap
    id: ivRefreshCalendar

  - name: Let the calendar sync settle
    action: sleep
    seconds: 3

  - name: Wait for the recurring fixture event to appear
    action: wait_for_text
    text: REG-EVENT-RECURRING-001
    timeout_seconds: 25

  - name: Capture agenda view with recurring fixture event
    action: screenshot
    screenshot_name: 00_agenda_recurring_visible
    compare: false

  - name: Open the recurring fixture event
    action: tap
    text: REG-EVENT-RECURRING-001

  - name: Wait for event detail dialog to render
    action: wait_for_id
    id: tvEventDetailTitle
    timeout_seconds: 10

  - name: Assert the recurring event's title is shown
    action: assert_text
    text: REG-EVENT-RECURRING-001

  - name: Assert the recurring indicator row is present
    action: assert_id
    id: tvEventDetailRecurring

  - name: Capture recurring event detail
    action: screenshot
    screenshot_name: 01_recurring_event_detail
    compare: false

  - name: Close event detail
    action: tap
    id: btnEventDetailClose

  - name: Wait for the exception occurrence to appear
    action: wait_for_text
    text: REG-EVENT-EXCEPTION-001
    timeout_seconds: 20

  - name: Open the exception occurrence
    action: tap
    text: REG-EVENT-EXCEPTION-001

  - name: Wait for event detail dialog to render again
    action: wait_for_id
    id: tvEventDetailTitle
    timeout_seconds: 10

  - name: Assert the exception occurrence's overridden title is shown
    action: assert_text
    text: REG-EVENT-EXCEPTION-001

  - name: Assert the exception occurrence is not shown under the series' original title
    action: fail_if_text
    text: REG-EVENT-RECURRING-001

  - name: Capture exception occurrence detail
    action: screenshot
    screenshot_name: 02_exception_occurrence_detail
    compare: false

  - name: Close event detail
    action: tap
    id: btnEventDetailClose

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
