name: calee-calendar-event-fields
tags: [calendar, event-detail, tablet]
requires_state: logged_in_tablet
default_timeout_seconds: 20
steps:
  - name: Launch Calee
    action: launch

  - name: Let home screen settle
    action: sleep
    seconds: 3

  - name: Open Calendar if present
    action: tap_if_present
    text: Calendar

  - name: Let calendar settle
    action: sleep
    seconds: 2

  # NOTE for technical owner: the exact tap target for "an existing event" is not
  # knowable without real fixture data (see docs/TEST_DATA_RESET_CONTRACT.md). Tune
  # this tap once known event fixtures exist on the prepared demo account.
  - name: Open an event if one is visible
    action: tap_if_present
    text: Event

  - name: Let event detail settle
    action: sleep
    seconds: 1.5

  - name: Capture event detail screen
    action: screenshot
    screenshot_name: 00_event_detail
    compare: false

  # Wrapped in "optional": a fresh/empty calendar may legitimately have no events,
  # which is a reason to skip this assertion, not fail the scenario.
  - name: Assert event detail fields are present
    action: optional
    step:
      name: Assert event field labels
      action: assert_any_text
      texts: [Title, Time, Location, Notes, Start, End]

  - name: Assert no crash/error dialog is showing
    action: fail_if_text
    texts: ["Unfortunately", "has stopped", "Force Close", "Error"]
