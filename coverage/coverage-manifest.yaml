# Regression coverage manifest (Phase 12) -- the single machine-readable
# source of truth for what each area of the Calee solution has, offline, and
# what still needs a physical device.
#
# Per-component fields:
#   automated:        true | partial | draft | false
#                       true    = fully automated coverage exists and runs
#                       partial = some automated coverage; more is device-gated
#                       draft   = scenario/orchestration exists but is
#                                 draft-unverified (never release-gating)
#                       false   = no automated coverage yet
#   offlineTested:    bool -- proven by fakes/contract/unit tests with no device
#   physicalVerified: bool -- has PASSED on a real device in a recorded session
#   releaseGating:    bool -- a real release must not ship without this passing
#   blocked:          bool -- currently BLOCKED on a missing prerequisite
#   optional:         bool -- explicitly opt-out for a given release scope
#   unsupported:      bool -- cannot be automated with today's primitives
#   owningRepo:       which repo owns the implementation
#   scenarioSuite:    (optional) the calee-regression suite name, cross-checked
#                     against suites.py by test_coverage_manifest.py
#   notes:            short human context
#
# CONSISTENCY (enforced by framework_tests/test_coverage_manifest.py):
#   * a draft component is never releaseGating
#   * an unsupported component is never releaseGating and never automated:true
#   * a component naming a scenarioSuite that is release-gating must have that
#     suite inside a COMPOSITE_SUITES entry; a draft one must be OUTSIDE
#     full-tester/release-technical
#   * nothing here is physicalVerified: true (no device this session)

