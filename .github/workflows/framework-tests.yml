name: framework-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest

      - name: Validate all scenario files parse cleanly
        run: |
          python -c "
          from calee_regression import suites
          from calee_regression.runner import load_scenario

          failures = []
          for name in suites.all_suite_names():
              for path in suites.resolve_suite(name):
                  try:
                      load_scenario(path)
                  except Exception as exc:
                      failures.append(f'{path}: {exc}')

          if failures:
              print('Scenario validation failed:')
              for f in failures:
                  print(f' - {f}')
              raise SystemExit(1)

          print('All scenario files parsed cleanly.')
          "

      - name: Validate config templates load with placeholders filled in
        run: |
          python -c "
          import tempfile, pathlib
          from calee_regression.config import load_config

          template = pathlib.Path('config/tester.local.example.yaml').read_text()
          filled = template.replace('PUT_ACTIVITY_HERE', '.ui.HomeActivity')
          with tempfile.NamedTemporaryFile('w', suffix='.yaml', delete=False) as f:
              f.write(filled)
              path = f.name
          load_config(path)
          print('config/tester.local.example.yaml loads cleanly once placeholders are filled in.')
          "

      - name: Shellcheck tester launchers and scripts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck -S warning tester/*.command tester/advanced/*.command tester/technical/*.command scripts/*.sh

      - name: Dry-run the tester environment bootstrap (no real device/Appium needed)
        run: |
          cp config/tester.local.example.yaml config/tester.local.yaml
          bash -c '
            source scripts/ensure_environment.sh
            python -c "import click, yaml, appium, selenium, PIL, numpy; print(\"all runtime dependencies import cleanly\")"
          '
