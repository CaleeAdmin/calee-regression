name: framework-tests

on:
  push:
  pull_request:
  # Priority 8: run the SAME required gates on the merge commit GitHub creates
  # in a merge queue, so what actually lands is tested -- not just each branch.
  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest

      - name: Release-metadata consistency (coverage manifest + promotion state machine)
        run: python -m calee_regression coverage-report --check

      - name: Machine-config example is valid and secret-free
        run: |
          python -c "
          import yaml
          from calee_regression.machine_config import validate_machine_config
          raw = yaml.safe_load(open('config/machine.local.example.yaml'))
          errors = validate_machine_config(raw)
          if errors:
              print('machine.local.example.yaml invalid:')
              for e in errors: print(' -', e)
              raise SystemExit(1)
          print('machine.local.example.yaml is valid and secret-free.')
          "

      - name: Validate all scenario files parse cleanly
        run: |
          python -c "
          from calee_regression import suites
          from calee_regression.runner import load_scenario

          failures = []
          for name in suites.all_suite_names():
              for path in suites.resolve_suite(name):
                  try:
                      load_scenario(path)
                  except Exception as exc:
                      failures.append(f'{path}: {exc}')

          if failures:
              print('Scenario validation failed:')
              for f in failures:
                  print(f' - {f}')
              raise SystemExit(1)

          print('All scenario files parsed cleanly.')
          "

      - name: Validate config templates load with placeholders filled in
        run: |
          python -c "
          import tempfile, pathlib
          from calee_regression.config import load_config

          template = pathlib.Path('config/tester.local.example.yaml').read_text()
          filled = template.replace('PUT_ACTIVITY_HERE', '.ui.HomeActivity')
          with tempfile.NamedTemporaryFile('w', suffix='.yaml', delete=False) as f:
              f.write(filled)
              path = f.name
          load_config(path)
          print('config/tester.local.example.yaml loads cleanly once placeholders are filled in.')
          "

      - name: Shellcheck tester launchers and scripts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck -S warning tester/*.command tester/advanced/*.command tester/technical/*.command scripts/*.sh

      - name: Dry-run the tester environment bootstrap (no real device/Appium needed)
        run: |
          cp config/tester.local.example.yaml config/tester.local.yaml
          bash -c '
            source scripts/ensure_environment.sh
            python -c "import click, yaml, appium, selenium, PIL, numpy; print(\"all runtime dependencies import cleanly\")"
          '

      # Priority 8: embed the EXACT commit SHA under test into framework-test
      # evidence and retain it as an artifact. On a push to main (or the merge
      # commit in a merge queue) GITHUB_SHA is exactly the content that will
      # ship, so a green run is provably about that commit -- not a stale one.
      # Runs on every event (always) so evidence is retained even on failure.
      - name: Record framework-test evidence (exact commit SHA)
        if: always()
        run: |
          python - <<'PY'
          import datetime, json, os
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          ref = os.environ.get("GITHUB_REF", "")
          summary = {
              "schemaVersion": 1,
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "workflow": "framework-tests",
              "workflowFile": ".github/workflows/framework-tests.yml",
              "event": event,
              "ref": ref,
              "commitSha": os.environ.get("GITHUB_SHA", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "isMainPush": event == "push" and ref == "refs/heads/main",
              "isMergeGroup": event == "merge_group",
              "generatedAt": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }
          with open("framework-test-summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          print(json.dumps(summary, indent=2))
          step = os.environ.get("GITHUB_STEP_SUMMARY")
          if step:
              with open(step, "a") as f:
                  f.write("### framework-tests evidence\n\n")
                  f.write(f"- commit `{summary['commitSha']}`\n")
                  f.write(f"- event `{summary['event']}`\n")
                  f.write(f"- ref `{summary['ref']}`\n")
          PY

      - name: Upload framework-test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-test-summary-${{ github.sha }}
          path: framework-test-summary.json
          retention-days: 90
          if-no-files-found: error

      # Priority 8: merge-commit smoke check. When GitHub creates a merge commit
      # (merge_group) or a commit lands on main, verify the retained evidence
      # embeds the exact commit under test -- so a green check can never be
      # mistaken for evidence about a different commit.
      - name: Merge-commit / main smoke check (evidence embeds the exact SHA)
        if: github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          python - <<'PY'
          import json, os, sys
          data = json.load(open("framework-test-summary.json"))
          expected = os.environ.get("GITHUB_SHA", "")
          if not expected or data.get("commitSha") != expected:
              print(f"FAIL: evidence commitSha {data.get('commitSha')!r} != commit under test {expected!r}.")
              sys.exit(1)
          print(f"Merge-commit/main smoke check OK: framework-test evidence embeds {data['commitSha']}.")
          PY
