name: framework-tests

on:
  push:
  pull_request:
  # Priority 8: run the SAME required gates on the merge commit GitHub creates
  # in a merge queue, so what actually lands is tested -- not just each branch.
  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest

      # This session: the vendored cross-repository focused-execution contract
      # must load and be a version this orchestrator supports, and the focused
      # invocation it builds must be entirely within that contract -- a renamed
      # mobile suite or retired purpose fails here, not on a tester's Mac.
      - name: Focused-execution contract is vendored, supported, and drift-free
        run: |
          python -c "
          from calee_regression import focused_contract
          contract = focused_contract.load_contract()
          problems = focused_contract.validate_focused_invocation(
              contract,
              api_suite='chores-stop-repeating',
              execution_purposes=['focused-environment-check', 'focused-post-fix-verification'],
              ui_target='integration_test/app_boot_test.dart',
          )
          if problems:
              print('Focused contract drift:')
              for p in problems: print(' -', p)
              raise SystemExit(1)
          print('Vendored focused-execution contract version',
                contract['focusedContractVersion'], 'is supported and drift-free.')
          "

      - name: Release-metadata consistency (coverage manifest + promotion state machine)
        run: python -m calee_regression coverage-report --check

      # The framework-completeness report is derived purely from repository
      # metadata + validated physical reports. This proves the committed
      # coverage/framework-completeness.{json,md} artifacts have not drifted
      # from a freshly-derived report (a scenario tag / suite / feature-scope
      # change that isn't reflected in the committed report is a red build).
      - name: Framework-completeness report is drift-free
        run: python -m calee_regression framework-completeness --check

      - name: Machine-config example is valid and secret-free
        run: |
          python -c "
          import yaml
          from calee_regression.machine_config import validate_machine_config
          raw = yaml.safe_load(open('config/machine.local.example.yaml'))
          errors = validate_machine_config(raw)
          if errors:
              print('machine.local.example.yaml invalid:')
              for e in errors: print(' -', e)
              raise SystemExit(1)
          print('machine.local.example.yaml is valid and secret-free.')
          "

      - name: Validate all scenario files parse cleanly
        run: |
          python -c "
          from calee_regression import suites
          from calee_regression.runner import load_scenario

          failures = []
          for name in suites.all_suite_names():
              for path in suites.resolve_suite(name):
                  try:
                      load_scenario(path)
                  except Exception as exc:
                      failures.append(f'{path}: {exc}')

          if failures:
              print('Scenario validation failed:')
              for f in failures:
                  print(f' - {f}')
              raise SystemExit(1)

          print('All scenario files parsed cleanly.')
          "

      - name: Validate config templates load with placeholders filled in
        run: |
          python -c "
          import tempfile, pathlib
          from calee_regression.config import load_config

          template = pathlib.Path('config/tester.local.example.yaml').read_text()
          filled = template.replace('PUT_ACTIVITY_HERE', '.ui.HomeActivity')
          with tempfile.NamedTemporaryFile('w', suffix='.yaml', delete=False) as f:
              f.write(filled)
              path = f.name
          load_config(path)
          print('config/tester.local.example.yaml loads cleanly once placeholders are filled in.')
          "

      - name: Shellcheck tester launchers and scripts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck -S warning tester/*.command tester/advanced/*.command tester/technical/*.command scripts/*.sh

      - name: Dry-run the tester environment bootstrap (no real device/Appium needed)
        run: |
          cp config/tester.local.example.yaml config/tester.local.yaml
          bash -c '
            source scripts/ensure_environment.sh
            python -c "import click, yaml, appium, selenium, PIL, numpy; print(\"all runtime dependencies import cleanly\")"
          '

      # Priority 8: embed the EXACT commit SHA under test into framework-test
      # evidence and retain it as an artifact. On a push to main (or the merge
      # commit in a merge queue) GITHUB_SHA is exactly the content that will
      # ship, so a green run is provably about that commit -- not a stale one.
      # Runs on every event (always) so evidence is retained even on failure.
      - name: Record framework-test evidence (exact commit SHA)
        if: always()
        run: |
          python - <<'PY'
          import datetime, json, os
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          ref = os.environ.get("GITHUB_REF", "")
          summary = {
              "schemaVersion": 1,
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "workflow": "framework-tests",
              "workflowFile": ".github/workflows/framework-tests.yml",
              "event": event,
              "ref": ref,
              "commitSha": os.environ.get("GITHUB_SHA", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "isMainPush": event == "push" and ref == "refs/heads/main",
              "isMergeGroup": event == "merge_group",
              "generatedAt": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }
          with open("framework-test-summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          print(json.dumps(summary, indent=2))
          step = os.environ.get("GITHUB_STEP_SUMMARY")
          if step:
              with open(step, "a") as f:
                  f.write("### framework-tests evidence\n\n")
                  f.write(f"- commit `{summary['commitSha']}`\n")
                  f.write(f"- event `{summary['event']}`\n")
                  f.write(f"- ref `{summary['ref']}`\n")
          PY

      - name: Upload framework-test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-test-summary-${{ github.sha }}
          path: framework-test-summary.json
          retention-days: 90
          if-no-files-found: error

      # Priority 8: merge-commit smoke check. When GitHub creates a merge commit
      # (merge_group) or a commit lands on main, verify the retained evidence
      # embeds the exact commit under test -- so a green check can never be
      # mistaken for evidence about a different commit.
      - name: Merge-commit / main smoke check (evidence embeds the exact SHA)
        if: github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          python - <<'PY'
          import json, os, sys
          data = json.load(open("framework-test-summary.json"))
          expected = os.environ.get("GITHUB_SHA", "")
          if not expected or data.get("commitSha") != expected:
              print(f"FAIL: evidence commitSha {data.get('commitSha')!r} != commit under test {expected!r}.")
              sys.exit(1)
          print(f"Merge-commit/main smoke check OK: framework-test evidence embeds {data['commitSha']}.")
          PY

  hermetic:
    # Workstream 8: prove the tester launchers/bootstrap are hermetically bound
    # to the repository .venv -- NO globally-installed project dependency is
    # required for any launcher to work. This is a clean-room job: unlike `test`
    # above, it installs ONLY into the repo .venv, never into the system python.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create an isolated repository .venv (installed into ONLY the .venv)
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip >/dev/null
          ./.venv/bin/python -m pip install -e '.[dev]'

      - name: Prove no global project dependency is required
        run: |
          # The SYSTEM interpreter must NOT be able to import the framework's
          # deps -- only the repo .venv can. If it can, a global install leaked
          # in and the hermetic guarantee is not actually being exercised.
          if python -c 'import click' 2>/dev/null; then
            echo "FAIL: click is importable from the system interpreter (global install leaked)."; exit 1
          fi
          echo "OK: system interpreter has no project deps; only the repo .venv does."

      - name: Launcher/bootstrap tests under a PATH stripped of the .venv
        run: |
          # Strip any venv bin from PATH; the launchers must still bind to the
          # ABSOLUTE repo interpreter exported by bootstrap. These tests set
          # PATH=/usr/bin:/bin internally and pin CALEE_PYTHON to the .venv, so
          # a green run proves no global click/package is needed.
          env -u VIRTUAL_ENV PATH="/usr/bin:/bin:/usr/sbin:/sbin" \
            ./.venv/bin/python -m pytest -q \
              framework_tests/test_hermetic_bootstrap.py \
              framework_tests/test_caleemobile_launcher.py \
              framework_tests/test_full_solution_fail_fast.py \
              framework_tests/test_release_launcher_e2e.py

      - name: No tester launcher invokes the framework with a bare python
        run: |
          ./.venv/bin/python -m pytest -q framework_tests/test_hermetic_bootstrap.py \
            -k "bare_python or uses_calee_python"

      - name: host-capabilities classifies this cloud host as OFFLINE_FRAMEWORK_ONLY
        run: |
          ./.venv/bin/python -m calee_regression host-capabilities --format json > host-capabilities.json
          ./.venv/bin/python - <<'PY'
          import json
          d = json.load(open("host-capabilities.json"))
          assert d["report"] == "host-capabilities", d
          assert d["executionCapability"] == "OFFLINE_FRAMEWORK_ONLY", d["executionCapability"]
          print("host-capabilities OK:", d["executionCapability"])
          PY

      - name: "Completeness schema migration (v2 = three independent measures)"
        run: |
          ./.venv/bin/python -m calee_regression framework-completeness --check
          ./.venv/bin/python - <<'PY'
          from calee_regression import framework_completeness as fc
          d = fc.build_report().to_dict()
          assert d["schemaVersion"] == 2, d["schemaVersion"]
          for k in ("implementationCompleteness", "qualificationCompleteness", "releaseReadiness"):
              assert k in d, f"missing {k}"
          impl = d["implementationCompleteness"]["implementationCompletionPercent"]
          qual = d["qualificationCompleteness"]["qualificationCompletionPercent"]
          assert impl >= qual, (impl, qual)
          assert "weightedCompletionPercent" in d["summary"]  # legacy preserved
          assert d["releaseReadiness"]["status"] in ("pass", "fail", "blocked", "not-applicable")
          print(f"completeness v2 OK: implementation={impl}% qualification={qual}% readiness={d['releaseReadiness']['status']}")
          PY

      - name: Evidence-bundle, promotion fail-closed, qualification-plan, host-capabilities
        run: |
          ./.venv/bin/python -m pytest -q \
            framework_tests/test_evidence_bundle.py \
            framework_tests/test_scenario_promotion.py \
            framework_tests/test_qualification_plan.py \
            framework_tests/test_host_capabilities.py \
            framework_tests/test_completeness_axes.py
